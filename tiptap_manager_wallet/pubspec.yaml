name: tiptap_manager_wallet
description: TIPTAP Manager Wallet – view balance and request withdrawals (TZ & SA).
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  intl: ^0.20.2
  provider: ^6.1.2
  url_launcher: ^6.3.1
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  adaptive_icon_background: "#4B2C7F"
  adaptive_icon_foreground: assets/images/logo.png
  remove_alpha_ios: true
  android_rounded_icon: true
  ios_rounded_icon: true
  web:
    generate: true
    image_path: assets/images/logo.png
    background_color: "#4B2C7F"
    theme_color: "#4B2C7F"
    rounded_icon: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/icons/social/
