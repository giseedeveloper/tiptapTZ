# ─────────────────────────────────────────────────────────────────────────────
# TIPTAP Africa – Nginx configuration
# App  : https://tiptapafrica.co.za        →  Laravel (PHP-FPM)
# Admin: https://tiptapafrica.co.za/database/  →  phpMyAdmin (full access)
# ─────────────────────────────────────────────────────────────────────────────

upstream php_fpm {
    server app:9000;
    keepalive 32;
}

# ── 1. HTTP → HTTPS redirect (also serves Let's Encrypt ACME challenges) ─────
server {
    listen 80;
    server_name tiptapafrica.co.za www.tiptapafrica.co.za;

    # Let's Encrypt webroot challenge – must be on HTTP
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://tiptapafrica.co.za$request_uri;
    }
}

# ── 2. Catch-all for direct IP access on HTTP ────────────────────────────────
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

# ── 3. HTTPS – main application ──────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name tiptapafrica.co.za www.tiptapafrica.co.za;

    # ── SSL certificates (Let's Encrypt via certbot) ──────────────────────
    ssl_certificate     /etc/letsencrypt/live/tiptapafrica.co.za-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tiptapafrica.co.za-0001/privkey.pem;

    # ── SSL hardening ─────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout          5s;

    root  /var/www/html/public;
    index index.php index.html;

    client_max_body_size 300M;
    client_body_timeout  300s;

    # ── Security headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml;

    # ─────────────────────────────────────────────────────────────────────
    # phpMyAdmin  →  /database/
    # PMA_ABSOLUTE_URI tells phpMyAdmin its own base URL so all asset/
    # redirect links are generated correctly.
    # Nginx strips /database/ before forwarding to the phpMyAdmin container.
    # ─────────────────────────────────────────────────────────────────────
    location = /database {
        return 301 /database/;
    }

    location ^~ /database/ {
        proxy_pass            http://phpmyadmin:80/;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Connection        "";
        proxy_read_timeout    300s;
        proxy_connect_timeout 30s;
        proxy_buffering       off;
        client_max_body_size  512M;
    }

    # ─────────────────────────────────────────────────────────────────────
    # Laravel-served uploads (ServeStorageController) – must bypass static *.jpg
    # ─────────────────────────────────────────────────────────────────────
    location ^~ /serve-storage/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /storage/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─────────────────────────────────────────────────────────────────────
    # Laravel application
    # ─────────────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass   php_fpm;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO       $fastcgi_path_info;
        include        fastcgi_params;
        fastcgi_read_timeout  300s;
        fastcgi_buffer_size   16k;
        fastcgi_buffers       4 16k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* /build/.+\.(js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    access_log /var/log/nginx/tiptap_access.log;
    error_log  /var/log/nginx/tiptap_error.log warn;
}
