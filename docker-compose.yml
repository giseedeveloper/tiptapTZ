# TIPTAP Tanzania – Docker Compose
# Domain: https://tiptapafrica.co.tz
# Repo:  https://github.com/ESNyarobi123/Tiptaptz

services:

  nginx:
    image: nginx:1.27-alpine
    container_name: tiptap_tz_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Production TZ uses Let's Encrypt; default-ssl.conf includes HTTP→HTTPS redirect.
      - ./docker/nginx/default-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/html/public:ro
      - app_storage:/var/www/html/storage:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_started
      phpmyadmin:
        condition: service_started
    networks:
      - tiptap_net

  certbot:
    image: certbot/certbot:latest
    container_name: tiptap_tz_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"
    networks:
      - tiptap_net

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tiptap_tz_app
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - app_public:/var/www/html/public
      - app_storage:/var/www/html/storage
      - ./.env.docker:/var/www/html/.env:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - tiptap_net

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tiptap_tz_queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600", "--no-interaction"]
    env_file:
      - .env.docker
    volumes:
      - app_storage:/var/www/html/storage
      - ./.env.docker:/var/www/html/.env:ro
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - tiptap_net

  mysql:
    image: mysql:8.0
    container_name: tiptap_tz_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-TiptapTz@2026!}
      MYSQL_DATABASE: taptap
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --innodb-buffer-pool-size=256M
    volumes:
      - mysql_data:/var/lib/mysql
      - ./TiptapR.sql:/docker-entrypoint-initdb.d/01_tiptap.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-TiptapTz@2026!}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - tiptap_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: tiptap_tz_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-TiptapTz@2026!}
      PMA_ABSOLUTE_URI: https://tiptapafrica.co.tz/database/
      UPLOAD_LIMIT: 512M
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - tiptap_net

volumes:
  mysql_data:
  app_public:
  app_storage:
  certbot_www:
  certbot_certs:

networks:
  tiptap_net:
    driver: bridge
