# TIPTAP Tanzania – Nginx (HTTP bootstrap; enable SSL after certbot)
# App: https://tiptapafrica.co.tz

upstream php_fpm {
    server app:9000;
    keepalive 32;
}

server {
    listen 80;
    server_name tiptapafrica.co.tz www.tiptapafrica.co.tz;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    root  /var/www/html/public;
    index index.php index.html;

    client_max_body_size 300M;
    client_body_timeout  300s;

    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location = /database {
        return 301 /database/;
    }

    location ^~ /database/ {
        proxy_pass            http://phpmyadmin:80/;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    300s;
        client_max_body_size  512M;
    }

    location ^~ /serve-storage/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /storage/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass   php_fpm;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO       $fastcgi_path_info;
        include        fastcgi_params;
        fastcgi_read_timeout 300s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /var/log/nginx/tiptap_tz_access.log;
    error_log  /var/log/nginx/tiptap_tz_error.log warn;
}

server {
    listen 80 default_server;
    server_name _;
    return 444;
}
