# TIPTAP Tanzania – Nginx HTTPS (use after: bash scripts/enable-ssl-tz.sh)
# Replace docker/nginx/default.conf with this file after certbot issues certificates.

upstream php_fpm {
    server app:9000;
    keepalive 32;
}

server {
    listen 80;
    server_name tiptapafrica.co.tz www.tiptapafrica.co.tz;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    location / {
        return 301 https://tiptapafrica.co.tz$request_uri;
    }
}

server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl;
    http2 on;
    server_name tiptapafrica.co.tz www.tiptapafrica.co.tz;

    ssl_certificate     /etc/letsencrypt/live/tiptapafrica.co.tz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tiptapafrica.co.tz/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;

    root  /var/www/html/public;
    index index.php index.html;

    client_max_body_size 300M;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css text/javascript application/json application/javascript text/xml application/xml image/svg+xml;

    location = /database {
        return 301 /database/;
    }

    location ^~ /database/ {
        proxy_pass            http://phpmyadmin:80/;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    300s;
        client_max_body_size  512M;
    }

    location ^~ /serve-storage/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /storage/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass   php_fpm;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO       $fastcgi_path_info;
        include        fastcgi_params;
        fastcgi_read_timeout 300s;
    }

    location ~* /build/.+\.(js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /var/log/nginx/tiptap_tz_access.log;
    error_log  /var/log/nginx/tiptap_tz_error.log warn;
}
